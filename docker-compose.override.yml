version: "3.9"

services:

  # =======================
  # API GATEWAY
  # =======================
  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/ApiGateway/Dockerfile
    container_name: api-gateway
    ports:
      - "5000:8080"

  # =======================
  # AUTHENTICATION
  # =======================
  authentication-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: authentication-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"
    ports:
      - "6001:1433"
    volumes:
      - authentication_db_data:/var/opt/mssql

  authentication-service:
    build:
      context: .
      dockerfile: src/AuthenticationService/AuthenticationService.Api/Dockerfile
    container_name: authentication-service
    ports:
      - "7001:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=authentication-db,1433;Database=AuthenticationDb;User Id=sa;Password=Password123!;TrustServerCertificate=True;"
    depends_on:
      - authentication-db

  # =======================
  # WORKOUT
