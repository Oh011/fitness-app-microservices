<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding:20px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; padding:40px;">
                    <tr>
                        <td>
                            <h2 style="color:#333333; margin-top:0;">Reset your password</h2>
                            <p style="color:#555555; font-size:14px; line-height:1.6;">
                                Hi {{UserName}},
                            </p>
                            <p style="color:#555555; font-size:14px; line-height:1.6;">
                                We received a request to reset your password. Click the button below to choose a new one.
                            </p>
                            <table cellpadding="0" cellspacing="0" style="margin:30px 0;">
                                <tr>
                                    <td style="background-color:#4F46E5; border-radius:6px;">
                                        <a href="{{ResetUrl}}" style="display:inline-block; padding:12px 28px; color:#ffffff; text-decoration:none; font-size:14px; font-weight:bold;">
                                            Reset Password
                                        </a>
                                    </td>
                                </tr>
                            </table>
                            <p style="color:#999999; font-size:12px; line-height:1.6;">
                                This link expires in 15 minutes. If you didn't request a password reset, you can safely ignore this email — your password will not be changed.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
